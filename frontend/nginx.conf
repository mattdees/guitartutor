server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the backend container
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # JS and CSS — never cache (no-store bypasses Cloudflare's Browser Cache TTL override)
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    # Everything else (images, fonts, etc.) — cache for 1 day
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # Serve static files; fall back to index.html for SPA routes.
    # index.html is served with no-store so deploys are always picked up.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
